<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instâncias WhatsApp</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0b141a;
    --panel:#111b21;
    --panel-hover:#18252d;
    --line:#26343d;
    --text:#e9edef;
    --muted:#8696a0;
    --green:#25d366;
    --green-soft:rgba(37,211,102,.12);
    --yellow:#f0b232;
    --gray:#9aa7af;
    --red:#f15c6d;
    --red-soft:rgba(241,92,109,.1);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  button,input{font:inherit}
  header{height:64px;display:flex;align-items:center;gap:12px;padding:0 24px;background:var(--panel);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;display:grid;place-items:center;border-radius:10px;background:var(--green);color:#062b16;font-weight:800}
  h1{margin:0;font-size:16px;font-weight:650;letter-spacing:.1px}
  .health{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(241,92,109,.12)}
  .health.ok{background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .spacer{flex:1}
  button{cursor:pointer;border:0;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:650}
  .logout{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .logout:hover{color:var(--text);border-color:#42535e}
  main{width:min(1040px,calc(100% - 32px));margin:28px auto 64px}
  .panel{overflow:hidden;background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .panel-title{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
  .panel-title h2{margin:0;font-size:14px;font-weight:650}
  .panel-title span{margin-left:8px;color:var(--muted);font-size:12px}
  table{width:100%;border-collapse:collapse}
  th{padding:11px 16px;text-align:left;color:var(--muted);font-size:11px;font-weight:650;text-transform:uppercase;letter-spacing:.55px}
  td{padding:15px 16px;border-top:1px solid var(--line);font-size:14px;vertical-align:middle}
  tbody tr:hover{background:var(--panel-hover)}
  .instance-name{font-weight:650}
  .instance-id{margin-top:4px;color:var(--muted);font:11px ui-monospace,SFMono-Regular,Consolas,monospace}
  .profile{display:flex;align-items:center;gap:10px}
  .avatar{width:36px;height:36px;display:grid;place-items:center;overflow:hidden;border-radius:50%;background:#22313a;color:var(--muted);font-size:12px;font-weight:700}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .profile-name{font-size:13px}
  .phone{margin-top:3px;color:var(--muted);font:11px ui-monospace,SFMono-Regular,Consolas,monospace}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:650}
  .badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .badge.connected{color:var(--green);background:var(--green-soft)}
  .badge.connecting{color:var(--yellow);background:rgba(240,178,50,.12)}
  .badge.hibernated,.badge.disconnected{color:var(--gray);background:rgba(154,167,175,.1)}
  .date{color:var(--muted);font-size:12px;white-space:nowrap}
  .actions{text-align:right}
  .remove{background:transparent;border:1px solid rgba(241,92,109,.35);color:var(--red)}
  .remove:hover{background:var(--red-soft);border-color:var(--red)}
  .remove:disabled{opacity:.5;cursor:wait}
  .empty{padding:54px 20px;text-align:center;color:var(--muted)}
  .error{padding:18px 20px;color:var(--red);text-align:center}
  .overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:var(--bg)}
  .overlay.hidden{display:none}
  .login{width:min(340px,100%);padding:26px;background:var(--panel);border:1px solid var(--line);border-radius:16px;text-align:center}
  .login .logo{width:44px;height:44px;margin:0 auto 14px;border-radius:12px}
  .login h2{margin:0 0 6px;font-size:18px}
  .login p{margin:0 0 18px;color:var(--muted);font-size:13px}
  .login input{width:100%;padding:11px 12px;color:var(--text);background:#1d2a32;border:1px solid var(--line);border-radius:8px;outline:none;text-align:center}
  .login input:focus{border-color:var(--green)}
  .login button{width:100%;margin-top:12px;padding:11px;background:var(--green);color:#062b16}
  .login-error{min-height:18px;margin-top:10px;color:var(--red);font-size:12px}
  @media(max-width:760px){
    header{padding:0 16px}
    main{width:min(100% - 20px,1040px);margin-top:18px}
    .panel{overflow-x:auto}
    table{min-width:720px}
  }
</style>
</head>
<body>
<header>
  <div class="logo">W</div>
  <h1>Instâncias WhatsApp</h1>
  <span class="health" id="health" title="Servidor"></span>
  <div class="spacer"></div>
  <button class="logout" id="logout" hidden>Sair</button>
</header>

<main>
  <section class="panel">
    <div class="panel-title">
      <h2>Instâncias criadas</h2>
      <span id="total"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Instância</th>
          <th>Status</th>
          <th>WhatsApp</th>
          <th>Criada em</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="5" class="empty">Carregando…</td></tr>
      </tbody>
    </table>
  </section>
</main>

<div class="overlay" id="loginOverlay">
  <form class="login" id="loginForm">
    <div class="logo">W</div>
    <h2>Instâncias WhatsApp</h2>
    <p>Digite a senha para acessar</p>
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password" autofocus />
    <button type="submit">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>

<script>
const $ = selector => document.querySelector(selector);
const storageKey = 'wmKey';
let apiKey = '';
let started = false;

function escapeHTML(value){
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[char]);
}

function initials(value){
  const words = String(value || '').trim().split(/\s+/).filter(Boolean);
  return words.length ? (words[0][0] + (words[1]?.[0] || '')).toUpperCase() : '?';
}

function formatDate(value){
  if(!value) return '—';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return '—';
  return new Intl.DateTimeFormat('pt-BR', {dateStyle:'short', timeStyle:'short'}).format(date);
}

function statusLabel(status){
  return ({connected:'Conectada', connecting:'Conectando', hibernated:'Pausada', disconnected:'Desconectada'})[status] || 'Desconectada';
}

async function request(path, options = {}){
  const headers = new Headers(options.headers || {});
  if(apiKey) headers.set('Authorization', 'Bearer ' + apiKey);
  const response = await fetch(path, {...options, headers});
  if(response.status === 401){
    localStorage.removeItem(storageKey);
    apiKey = '';
    showLogin();
    throw new Error('Não autorizado');
  }
  if(!response.ok){
    const text = await response.text();
    let message = text || `Erro ${response.status}`;
    try{ message = JSON.parse(text).error || message; }catch{}
    throw new Error(message);
  }
  if(response.status === 204) return null;
  return response.json();
}

function showLogin(){
  $('#loginOverlay').classList.remove('hidden');
  $('#logout').hidden = true;
  $('#password').focus();
}

function startPanel(){
  $('#loginOverlay').classList.add('hidden');
  $('#logout').hidden = false;
  if(started) return;
  started = true;
  loadInstances();
  setInterval(loadInstances, 5000);
}

function profileHTML(instance){
  const label = instance.profileName || instance.owner || 'Sem perfil';
  const image = instance.profilePicUrl
    ? `<img src="${escapeHTML(instance.profilePicUrl)}" alt="" referrerpolicy="no-referrer" onerror="this.remove()" />`
    : escapeHTML(initials(label));
  const phone = instance.owner ? `<div class="phone">+${escapeHTML(instance.owner)}</div>` : '';
  return `<div class="profile"><div class="avatar">${image}</div><div><div class="profile-name">${escapeHTML(instance.profileName || '—')}</div>${phone}</div></div>`;
}

async function loadInstances(){
  try{
    const instances = await request('/instances') || [];
    $('#health').classList.add('ok');
    $('#total').textContent = instances.length === 1 ? '1 instância' : `${instances.length} instâncias`;
    if(!instances.length){
      $('#rows').innerHTML = '<tr><td colspan="5" class="empty">Nenhuma instância criada.</td></tr>';
      return;
    }
    $('#rows').innerHTML = instances.map(instance => `
      <tr>
        <td><div class="instance-name">${escapeHTML(instance.name)}</div><div class="instance-id">${escapeHTML(instance.id)}</div></td>
        <td><span class="badge ${escapeHTML(instance.status || 'disconnected')}">${statusLabel(instance.status)}</span></td>
        <td>${profileHTML(instance)}</td>
        <td class="date">${formatDate(instance.createdAt)}</td>
        <td class="actions"><button class="remove" data-remove="${escapeHTML(instance.id)}" data-name="${escapeHTML(instance.name)}">Remover</button></td>
      </tr>`).join('');
  }catch(error){
    $('#health').classList.remove('ok');
    if(error.message !== 'Não autorizado') $('#rows').innerHTML = `<tr><td colspan="5" class="error">${escapeHTML(error.message)}</td></tr>`;
  }
}

$('#rows').addEventListener('click', async event => {
  const button = event.target.closest('[data-remove]');
  if(!button) return;
  const name = button.dataset.name || 'esta instância';
  if(!confirm(`Remover ${name}? A sessão do WhatsApp também será desconectada.`)) return;
  button.disabled = true;
  button.textContent = 'Removendo…';
  try{
    await request(`/instances/${encodeURIComponent(button.dataset.remove)}`, {method:'DELETE'});
    await loadInstances();
  }catch(error){
    if(error.message !== 'Não autorizado') alert(error.message);
    button.disabled = false;
    button.textContent = 'Remover';
  }
});

$('#loginForm').addEventListener('submit', async event => {
  event.preventDefault();
  const candidate = $('#password').value;
  $('#loginError').textContent = '';
  try{
    const response = await fetch('/instances', {headers:{Authorization:'Bearer ' + candidate}});
    if(!response.ok) throw new Error();
    apiKey = candidate;
    localStorage.setItem(storageKey, candidate);
    $('#password').value = '';
    startPanel();
  }catch{
    $('#loginError').textContent = 'Senha incorreta';
    $('#password').value = '';
    $('#password').focus();
  }
});

$('#logout').addEventListener('click', () => {
  localStorage.removeItem(storageKey);
  apiKey = '';
  location.reload();
});

(async () => {
  const stored = localStorage.getItem(storageKey) || '';
  if(!stored){ showLogin(); return; }
  try{
    const response = await fetch('/instances', {headers:{Authorization:'Bearer ' + stored}});
    if(!response.ok) throw new Error();
    apiKey = stored;
    startPanel();
  }catch{
    localStorage.removeItem(storageKey);
    showLogin();
  }
})();
</script>
</body>
</html>
